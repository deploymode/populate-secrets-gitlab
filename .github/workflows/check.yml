name: Check

on:
  pull_request:
  push:
    branches-ignore:
      - master

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - run: uv sync --group dev

      - run: uv run ruff check .

      - run: uv run pytest
